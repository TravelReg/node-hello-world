name: Build and push Docker image

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/node-hello-world:dev

      - name: Trigger Coolify deployment
        env:
          COOLIFY_DEPLOY_TOKEN: ${{ secrets.COOLIFY_DEPLOY_TOKEN }}
          COOLIFY_NODEHELLOWORLD_WEBHOOK: ${{ secrets.COOLIFY_NODEHELLOWORLD_WEBHOOK }}
        run: |
          curl -X POST "$COOLIFY_NODEHELLOWORLD_WEBHOOK" \
            -H "Authorization: Bearer $COOLIFY_DEPLOY_TOKEN" \
            -H "Content-Type: application/json"
